<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Instructor Dashboard | ANU System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        // FRONTEND SECURITY
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'index.html';
        
        const payload = JSON.parse(atob(token.split('.')[1]));
        if (payload.role !== 'Instructor') {
            alert("Access Denied: Instructor privileges required.");
            window.location.href = 'index.html';
        }
    </script>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-secondary">
    <div class="container">
        <span class="navbar-brand mb-0 h1">Instructor Portal</span>
        <button class="btn btn-danger" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="container mt-4">
    <h3 class="mb-4">My Assigned Courses</h3>
    <div id="alerts"></div>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Code</th><th>Title</th><th>Semester</th><th>Schedule</th><th>Enrolled</th><th>Action</th>
                    </tr>
                </thead>
                <tbody id="instructor-courses">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="rosterModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title">Class Roster</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <table class="table table-bordered">
            <thead class="table-light">
                <tr><th>Student Name</th><th>Email</th><th>Registration Date</th></tr>
            </thead>
            <tbody id="roster-list"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    async function loadAssignedCourses() {
        const response = await fetch('/api/instructor/courses', { 
            headers: { 'Authorization': `Bearer ${token}` } 
        });
        const courses = await response.json();
        const tbody = document.getElementById('instructor-courses');
        tbody.innerHTML = '';

        if(courses.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center">You have no assigned courses this semester.</td></tr>';
            return;
        }
        
        courses.forEach(c => {
            tbody.innerHTML += `
                <tr>
                    <td><strong>${c.code}</strong></td>
                    <td>${c.title}</td>
                    <td>${c.semester}</td>
                    <td>${c.days} (${c.start_time})</td>
                    <td>${c.enrolled_count} / ${c.capacity}</td>
                    <td>
                        <button class="btn btn-info btn-sm text-white" onclick="viewRoster(${c.schedule_id})">View Roster</button>
                    </td>
                </tr>`;
        });
    }

    async function viewRoster(scheduleId) {
        const response = await fetch(`/api/instructor/courses/${scheduleId}/roster`, { 
            headers: { 'Authorization': `Bearer ${token}` } 
        });
        const students = await response.json();
        const tbody = document.getElementById('roster-list');
        tbody.innerHTML = '';

        if(students.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" class="text-center">No students currently enrolled.</td></tr>';
        } else {
            students.forEach(s => {
                const date = new Date(s.registration_date).toLocaleDateString();
                tbody.innerHTML += `
                    <tr>
                        <td>${s.first_name} ${s.last_name}</td>
                        <td>${s.email}</td>
                        <td>${date}</td>
                    </tr>`;
            });
        }

        // Show Modal using Bootstrap JS
        const modal = new bootstrap.Modal(document.getElementById('rosterModal'));
        modal.show();
    }

    function logout() {
        localStorage.removeItem('token');
        window.location.href = 'index.html';
    }

    // Initialize
    loadAssignedCourses();
</script>
</body>
</html>

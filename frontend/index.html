<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ANU Registration System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <h3 class="text-primary">ANU Portal</h3>
        <p class="text-muted">Sign in to your account</p>
    </div>
    
    <div id="login-alert"></div>

    <form id="loginForm">
        <div class="mb-3">
            <label for="email" class="form-label">University Email</label>
            <input type="email" class="form-control" id="email" required placeholder="name@anu.edu.eg">
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" required>
        </div>
        
        <div class="text-center mb-3">
            <small>Don't have an account? <a href="register.html">Register here</a></small>
        </div>

        <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const alertBox = document.getElementById('login-alert');

    try {
        const response = await fetch('http://localhost:3000/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();

        if (response.ok) {
            localStorage.setItem('token', data.token);
            // Redirect based on role
            if (data.role === 'Student') window.location.href = 'student-dashboard.html';
            else if (data.role === 'Admin') window.location.href = 'admin-dashboard.html';
            else if (data.role === 'Instructor') window.location.href = 'instructor-dashboard.html';
        } else {
            alertBox.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
        }
    } catch (error) {
        alertBox.innerHTML = `<div class="alert alert-danger">Server connection failed.</div>`;
    }
});
</script>
</body>
</html>
